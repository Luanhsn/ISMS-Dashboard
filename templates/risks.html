<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ISMS - Risk Management</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f8;
        }

        .navbar {
            background: #1f2937;
            color: white;
            padding: 15px;
        }

        .container {
            padding: 20px;
        }

        .button {
            display: inline-block;
            padding: 10px 15px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #e5e7eb;
        }

        .high {
            color: red;
            font-weight: bold;
        }

        .medium {
            color: orange;
            font-weight: bold;
        }

        .low {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>Risk Management (ISMS)</h2>
</div>

<div class="container">

    <a class="button" href="/">← Back to Dashboard</a>

    <form method="POST" action="/scan">
        <button type="submit">Scan</button>
    </form>


    <table>
    <tr>
        <th>Risk</th>
        <th>Description</th>
        <th>Category</th>
        <th>Score</th>
        <th>Status</th>
    </tr>

    {% for risk in risks %}
    <tr>
        <td>{{ risk.name }}</td>
        <td>{{ risk.description }}</td>
        <td>{{ risk.category }}</td>
        <td>{{ risk.score }}</td>
        <td>{{ risk.status }}</td>
        <td>{{ risk.likelihood }}</td>
        <td>{{ risk.impact }}</td>
        <td class="{% if risk.status_level == 'Critical' %}high{% elif risk.status_level == 'High' %}medium{% elif risk.status_level == 'Medium' %}low{% endif %}">
            {{ risk.status_level }}
        </td>
        <td>{{ risk.port }}</td>
    </tr>
    {% endfor %}


</table>

</div>

</body>
</html>
