<!DOCTYPE html>
<html lang="de">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <meta charset="UTF-8">
    <title>ISMS Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f8;
        }

        .navbar {
            background: #1f2937;
            color: white;
            padding: 15px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .metric {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .button {
            display: inline-block;
            padding: 10px 15px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .high { color: red; }
        .medium { color: orange; }
        .low { color: green; }
    </style>
</head>

<body>

<div class="navbar">
    <h2>ISMS Security Dashboard</h2>
</div>

<div class="container">

    <a class="button" href="/risks">View Risks</a>

    <div class="grid">
        <div class="metric">
            <h3>Critical Risks</h3>
            <p class="high">{{ critical }}</p>
        </div>

        <div class="metric">
            <h3>High Risks</h3>
            <p class="medium">{{ high }}</p>
        </div>

        <div class="metric">
            <h3>Medium Risks</h3>
            <p class="low">{{ medium }}</p>
        </div>
    </div>

    <canvas id="riskChart" width="400" height="400"></canvas>

    <div class="card">
        <h3>System Status</h3>
        <p>ISMS Monitoring active – No critical alerts</p>
    </div>

    <script>
        const ctx = document.getElementById("riskChart");
        new Chart(ctx, {
            type: "pie",
            data: {
                labels: ["Critical", "High", "Medium"],
                datasets: [{
                    data: [{{ critical }}, {{ high }}, {{ medium }}],
                    backgroundColor: ["red", "orange", "green"]
                }]
            }
        });
    </script>

</div>

</body>
</html>
