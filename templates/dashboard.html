<!DOCTYPE html>
<html lang="de">
<head>
    <!-- Chart.js for the pie chart -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <meta charset="UTF-8">
    <title>ISMS Dashboard</title>
    <style>
        /* Base layout */
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f8;
        }

        /* Top navigation bar */
        .navbar {
            background: #1f2937;
            color: white;
            padding: 15px;
        }

        .container {
            padding: 20px;
        }

        /* Generic card for content sections */
        .card {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 3-column grid for the metric boxes */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        /* Individual metric box (Critical / High / Medium count) */
        .metric {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        /* Shared button style for links and form buttons */
        .button {
            display: inline-block;
            padding: 10px 15px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        button.button {
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            border: none;
        }

        /* Risk level color coding */
        .high { color: red; }
        .medium { color: orange; }
        .low { color: green; }
    </style>
</head>

<body>

<div class="navbar">
    <h2>ISMS Security Dashboard</h2>
</div>

<div class="container">

    <!-- Navigation and scan trigger -->
    <div style="display: flex; gap: 10px;">
        <a class="button" href="/risks">View Risks</a>
        <!-- Hidden field tells the backend to redirect back to dashboard after scan -->
        <form action="/scan" method="POST">
            <input type="hidden" name="redirect_to" value="dashboard">
            <button type="submit" class="button">Scan</button>
        </form>
    </div>

    <!-- Risk summary metrics passed from Flask -->
    <div class="grid">
        <div class="metric">
            <h3>Critical Risks</h3>
            <p class="high">{{ critical }}</p>
        </div>

        <div class="metric">
            <h3>High Risks</h3>
            <p class="medium">{{ high }}</p>
        </div>

        <div class="metric">
            <h3>Medium Risks</h3>
            <p class="low">{{ medium }}</p>
        </div>
    </div>

    <!-- Pie chart visualizing risk distribution -->
    <div style="max-width: 300px;">
        <canvas id="riskChart"></canvas>
    </div>

    <script>
        // Initialize Chart.js pie chart with risk counts from Flask
        const ctx = document.getElementById("riskChart");
        new Chart(ctx, {
            type: "pie",
            data: {
                labels: ["Critical", "High", "Medium"],
                datasets: [{
                    data: [{{ critical }}, {{ high }}, {{ medium }}],
                    backgroundColor: ["red", "orange", "green"]
                }]
            },
            options: {
                maintainAspectRatio: true,
                responsive: true
            }
        });
    </script>

</div>

</body>
</html>
